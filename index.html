<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; height: 100vh; width: 100vw; }
#bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}
#membrane {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
}
#title {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Andale Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: rgba(220, 180, 160, 0.35);
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
}
#capsulas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 3;
  pointer-events: none;
}
.capsula {
  position: absolute;
  width: 38vw;
  max-width: 340px;
  min-width: 140px;
  pointer-events: all;
  cursor: pointer;
}
.capsula video {
  width: 100%;
  height: auto;
  display: block;
}
@keyframes float1 { 0%,100%{transform:translateY(0px) rotate(-1deg)} 50%{transform:translateY(-12px) rotate(1deg)} }
@keyframes float2 { 0%,100%{transform:translateY(-8px) rotate(2deg)} 50%{transform:translateY(6px) rotate(-1deg)} }
@keyframes float3 { 0%,100%{transform:translateY(4px) rotate(1deg)} 50%{transform:translateY(-10px) rotate(-2deg)} }
@keyframes float4 { 0%,100%{transform:translateY(-4px) rotate(-2deg)} 50%{transform:translateY(8px) rotate(1deg)} }
#cap0 { animation: float1 5.2s ease-in-out infinite; }
#cap1 { animation: float2 6.1s ease-in-out infinite; }
#cap2 { animation: float3 4.8s ease-in-out infinite; }
#cap3 { animation: float4 5.7s ease-in-out infinite; }
.capsula.active video {
  filter: brightness(1.4) saturate(1.3);
}
@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(2); opacity: 0; }
}
.pulse-ring {
  position: fixed;
  border-radius: 50%;
  background: rgba(200, 60, 40, 0.3);
  animation: pulse-ring 0.9s ease-out forwards;
  pointer-events: none;
  z-index: 4;
}
</style>
</head>
<body>
<div id="title">tender</div>

<!-- SHADER FONDO -->
<canvas id="bg"></canvas>

<!-- CÁPSULAS DE VIDEO -->
<div id="capsulas">
  <div class="capsula" id="cap0" style="left: 5vw; top: 5vh;">
    <video autoplay loop muted playsinline src="assets/videos/capsula1.mp4"></video>
  </div>
  <div class="capsula" id="cap1" style="left: 57vw; top: 5vh;">
    <video autoplay loop muted playsinline src="assets/videos/capsula2.mp4"></video>
  </div>
  <div class="capsula" id="cap2" style="left: 5vw; top: 55vh;">
    <video autoplay loop muted playsinline src="assets/videos/capsula3.mp4"></video>
  </div>
  <div class="capsula" id="cap3" style="left: 57vw; top: 55vh;">
    <video autoplay loop muted playsinline src="assets/videos/capsula4.mp4"></video>
  </div>
</div>

<!-- MEMBRANA ENCIMA -->
<canvas id="membrane"></canvas>

<script>
// ---- SHADER FONDO: carne borde a borde ----
const bg = document.getElementById('bg');
const gl = bg.getContext('webgl');

function resize() {
  bg.width = window.innerWidth;
  bg.height = window.innerHeight;
  gl.viewport(0, 0, bg.width, bg.height);
  mem.width = window.innerWidth;
  mem.height = window.innerHeight;
  glm.viewport(0, 0, mem.width, mem.height);
}

const vertSrc = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0, 1); }
`;

const fragBg = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;
uniform vec2 u_touch;
uniform float u_pulse;

float hash(vec2 p) {
  p = fract(p * vec2(234.34, 435.345));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}
float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i+vec2(1,0)), f.x),
    mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0; float amp = 0.5; float freq = 1.0;
  for(int i = 0; i < 6; i++) {
    v += amp * noise(p * freq);
    freq *= 2.1; amp *= 0.48;
    p += vec2(0.3, 0.7);
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  vec2 p = uv * 2.0 - 1.0;
  p.x *= u_res.x / u_res.y;
  float t = u_time * 0.18;

  vec2 q = vec2(fbm(p + t*0.3), fbm(p + vec2(1.7,9.2) + t*0.25));
  vec2 r = vec2(fbm(p + 1.5*q + vec2(1.7,9.2) + t*0.15), fbm(p + 1.5*q + vec2(8.3,2.8) + t*0.12));
  float f = fbm(p + 1.5*r + t*0.08);

  float breath = sin(t * 2.2) * 0.5 + 0.5;
  breath = breath * 0.06 + 0.97;

  float touchDist = length(uv - u_touch);
  float pulse = u_pulse * smoothstep(0.5, 0.0, touchDist) * sin(touchDist * 20.0 - u_time * 8.0);

  f = f * breath + pulse * 0.15;

  // Sin forma oval — llena toda la pantalla
  // Variacion de tono por zona para que no sea plano
  float zoneTone = fbm(p * 0.4 + vec2(3.1, 1.7)) * 0.3;
  f = clamp(f + zoneTone * 0.2, 0.0, 1.0);

  vec3 col1 = vec3(0.10, 0.02, 0.02);
  vec3 col2 = vec3(0.38, 0.08, 0.06);
  vec3 col3 = vec3(0.62, 0.20, 0.12);
  vec3 col4 = vec3(0.80, 0.45, 0.32);
  vec3 col5 = vec3(0.90, 0.68, 0.55);

  vec3 col;
  if(f < 0.25) col = mix(col1, col2, f/0.25);
  else if(f < 0.5) col = mix(col2, col3, (f-0.25)/0.25);
  else if(f < 0.75) col = mix(col3, col4, (f-0.5)/0.25);
  else col = mix(col4, col5, (f-0.75)/0.25);

  float veins = sin(fbm(p * 4.0 + t*0.05) * 20.0) * 0.035;
  col -= veins;
  col = clamp(col, 0.0, 1.0);

  gl_FragColor = vec4(col, 1.0);
}
`;

// ---- SHADER MEMBRANA ----
const mem = document.getElementById('membrane');
const glm = mem.getContext('webgl');

const fragMem = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;

float hash(vec2 p) {
  p = fract(p * vec2(234.34, 435.345));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}
float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i+vec2(1,0)), f.x),
    mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0; float amp = 0.5; float freq = 1.0;
  for(int i = 0; i < 4; i++) {
    v += amp * noise(p * freq);
    freq *= 2.2; amp *= 0.45;
    p += vec2(0.5, 0.3);
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  vec2 p = uv * 2.0 - 1.0;
  p.x *= u_res.x / u_res.y;
  float t = u_time * 0.08;

  // Ruido muy lento y suave
  float f = fbm(p * 1.8 + t);
  f = f * 0.5 + 0.5;

  // Solo visible en zonas concretas — muy sutil
  float opacity = (f - 0.48) * 0.18;
  opacity = clamp(opacity, 0.0, 0.12);

  // Color membrana: carne muy clara casi rosada translucida
  vec3 col = vec3(0.75, 0.28, 0.18);

  gl_FragColor = vec4(col, opacity);
}
`;

function makeProgram(g, vSrc, fSrc) {
  function compile(type, src) {
    const s = g.createShader(type);
    g.shaderSource(s, src);
    g.compileShader(s);
    return s;
  }
  const p = g.createProgram();
  g.attachShader(p, compile(g.VERTEX_SHADER, vSrc));
  g.attachShader(p, compile(g.FRAGMENT_SHADER, fSrc));
  g.linkProgram(p);
  return p;
}

function makeQuad(g) {
  const buf = g.createBuffer();
  g.bindBuffer(g.ARRAY_BUFFER, buf);
  g.bufferData(g.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), g.STATIC_DRAW);
  return buf;
}

// BG setup
const progBg = makeProgram(gl, vertSrc, fragBg);
gl.useProgram(progBg);
makeQuad(gl);
const posBg = gl.getAttribLocation(progBg, 'a_pos');
gl.enableVertexAttribArray(posBg);
gl.vertexAttribPointer(posBg, 2, gl.FLOAT, false, 0, 0);
const uTimeBg = gl.getUniformLocation(progBg, 'u_time');
const uResBg = gl.getUniformLocation(progBg, 'u_res');
const uTouchBg = gl.getUniformLocation(progBg, 'u_touch');
const uPulseBg = gl.getUniformLocation(progBg, 'u_pulse');

// Membrane setup
const progMem = makeProgram(glm, vertSrc, fragMem);
glm.useProgram(progMem);
makeQuad(glm);
const posMem = glm.getAttribLocation(progMem, 'a_pos');
glm.enableVertexAttribArray(posMem);
glm.vertexAttribPointer(posMem, 2, gl.FLOAT, false, 0, 0);
glm.enable(glm.BLEND);
glm.blendFunc(glm.SRC_ALPHA, glm.ONE_MINUS_SRC_ALPHA);
const uTimeMem = glm.getUniformLocation(progMem, 'u_time');
const uResMem = glm.getUniformLocation(progMem, 'u_res');

resize();
window.addEventListener('resize', resize);

let touchX = 0.5, touchY = 0.5, pulse = 0;

window.addEventListener('mousemove', e => {
  touchX = e.clientX / bg.width;
  touchY = 1.0 - e.clientY / bg.height;
});
window.addEventListener('click', e => {
  touchX = e.clientX / bg.width;
  touchY = 1.0 - e.clientY / bg.height;
  pulse = 1.0;
});
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchX = t.clientX / bg.width;
  touchY = 1.0 - t.clientY / bg.height;
  pulse = 1.0;
}, { passive: true });

function loop(t) {
  const time = t * 0.001;

  gl.useProgram(progBg);
  gl.uniform1f(uTimeBg, time);
  gl.uniform2f(uResBg, bg.width, bg.height);
  gl.uniform2f(uTouchBg, touchX, touchY);
  gl.uniform1f(uPulseBg, pulse);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  glm.useProgram(progMem);
  glm.uniform1f(uTimeMem, time);
  glm.uniform2f(uResMem, mem.width, mem.height);
  glm.drawArrays(glm.TRIANGLE_STRIP, 0, 4);

  pulse *= 0.92;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---- INTERACCIÓN CÁPSULAS ----
document.querySelectorAll('.capsula').forEach((cap, i) => {
  function trigger(e) {
    e.preventDefault();
    const rect = cap.getBoundingClientRect();
    touchX = (rect.left + rect.width / 2) / window.innerWidth;
    touchY = 1.0 - (rect.top + rect.height / 2) / window.innerHeight;
    pulse = 1.0;

    cap.classList.add('active');
    setTimeout(() => cap.classList.remove('active'), 500);

    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    const size = Math.max(rect.width, rect.height);
    ring.style.cssText = `width:${size}px;height:${size}px;left:${rect.left + rect.width/2 - size/2}px;top:${rect.top + rect.height/2 - size/2}px;`;
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 1000);

    console.log('capsula', i, 'triggered');
    // Aquí irá: reproducir sample de audio
  }
  cap.addEventListener('click', trigger);
  cap.addEventListener('touchstart', trigger, { passive: false });
});
</script>
</body>
</html>
